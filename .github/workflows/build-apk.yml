name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:   # ручной запуск кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Cache Gradle & Chaquopy
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.chaquopy
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/TgWsProxy-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-APK
          path: artifacts/TgWsProxy-debug.apk
          retention-days: 30

      # При создании тега v* — публикуем Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TgWsProxy-debug.apk
          name: "TG WS Proxy ${{ github.ref_name }}"
          body: |
            ## TG WS Proxy — Android APK

            Фоновый MTProto WebSocket прокси для Telegram.

            ### Установка
            1. Скачай `TgWsProxy-debug.apk`
            2. На телефоне: Настройки → Безопасность → **Разрешить установку из неизвестных источников**
            3. Установи APK
            4. Запусти → нажми **Запустить**
            5. В уведомлении появится ссылка — нажми **"Открыть в TG"**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
